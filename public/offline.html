<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClassCare 360 - Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f8fafc;
        color: #0f172a;
      }

      main {
        width: min(520px, calc(100vw - 32px));
        padding: 28px;
        border: 1px solid #dbe4ee;
        border-radius: 8px;
        background: #ffffff;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p {
        margin: 0;
        line-height: 1.7;
        color: #475569;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>ClassCare 360</h1>
      <p>ตอนนี้อุปกรณ์ออฟไลน์อยู่ กรุณาเชื่อมต่ออินเทอร์เน็ตอีกครั้งเพื่อใช้งานข้อมูลล่าสุด</p>
    </main>
  </body>
</html>
